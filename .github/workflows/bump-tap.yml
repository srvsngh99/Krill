name: Bump Homebrew tap

# After a release is published, update the homebrew-krill formula so that
# `brew upgrade krill` matches the new version. The release tarball is still
# built and uploaded manually (`make dist` + `gh release create`); this only
# bumps the tap's url / sha256 / version to match the published asset.

on:
  release:
    types: [published]
  # Allow re-running against an existing tag if a bump PR needs to be regenerated.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bump the tap to (e.g. v0.14.0)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version, download asset, hash it
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"   # v0.14.0
          VER="${TAG#v}"                                                          # 0.14.0
          ASSET="krill-${VER}-arm64-apple-macos.tar.gz"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
          echo "Downloading $URL"
          curl -fSL "$URL" -o "$ASSET"
          SHA=$(shasum -a 256 "$ASSET" | awk '{print $1}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved krill $VER  sha256=$SHA"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: srvsngh99/homebrew-krill
          token: ${{ secrets.TAP_TOKEN }}   # fine-grained PAT: Contents + PRs write on homebrew-krill

      - name: Rewrite Formula/krill.rb
        env:
          # Passed via env (not inlined into the script) so arbitrary
          # characters in the values can't break or inject into the rewrite.
          NEW_URL: ${{ steps.meta.outputs.url }}
          NEW_SHA: ${{ steps.meta.outputs.sha }}
          NEW_VER: ${{ steps.meta.outputs.ver }}
        run: |
          set -euo pipefail
          # Ruby (preinstalled on the runner, and the formula's own language)
          # rather than sed: block-form sub! preserves the indent via $1 with
          # no backreference-in-string ambiguity, and only the 3 target lines
          # change (the `assert_match ... version` test line is left alone).
          ruby -i -pe '
            $_.sub!(/^(\s*url\s+)".*"/)     { "#{$1}\"#{ENV["NEW_URL"]}\"" }
            $_.sub!(/^(\s*sha256\s+)".*"/)  { "#{$1}\"#{ENV["NEW_SHA"]}\"" }
            $_.sub!(/^(\s*version\s+)".*"/) { "#{$1}\"#{ENV["NEW_VER"]}\"" }
          ' Formula/krill.rb
          echo "----- updated formula -----"
          grep -E '^\s*(url|sha256|version) ' Formula/krill.rb
          ruby -c Formula/krill.rb   # fail fast if the rewrite broke the formula

      - name: Open bump PR
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ steps.meta.outputs.ver }}"
          BR="bump-krill-${VER}"
          git config user.name  "krill-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git switch -c "$BR"
          git commit -am "krill ${VER}"
          git push -u origin "$BR" --force-with-lease
          gh pr create --base main --head "$BR" \
            --title "krill ${VER}" \
            --body "Automated formula bump to match Krill release **v${VER}**.

          - url → \`${{ steps.meta.outputs.url }}\`
          - sha256 → \`${{ steps.meta.outputs.sha }}\`
          - version → \`${VER}\`

          Generated by \`.github/workflows/bump-tap.yml\` in srvsngh99/Krill." \
            || echo "PR may already exist for $BR; updated the branch."
