name: swift-tests

# Build + test the Swift package on every PR and on main. The
# project's core (KLMCore, KLMEngine, KLMRegistry, etc.) is
# Swift+MLX and lives outside the existing `tools-tests.yml`
# workflow, which only covers the Python helpers. Without this
# job nothing automatically catches a build break or test
# regression on the Swift surface.
#
# Runs on macOS (mlx-swift is Apple-only). Gated tests that
# require local model checkpoints (KLM_QWEN25VL_MODEL_PATH,
# KLM_GEMMA4_MODEL_PATH, KLM_MOE_MODEL_PATH,
# KLM_RERANKER_MODEL_PATH) skip with XCTSkip when their env
# variables are not set, so CI runs with ~22 skips out of the
# 415-ish test suite, exercising every code path that does not
# need a multi-GB checkpoint download.

on:
  pull_request:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.github/workflows/swift-tests.yml'
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.github/workflows/swift-tests.yml'
  workflow_dispatch:

# Drop in-flight CI on a PR when a new commit lands - the most
# recent push is always the one we want test results for.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test (macOS)
    # macos-26-arm64 is the only runner image that bundles an Xcode
    # shipping Swift 6.3. macos-15 tops out at Xcode 26.3 (Swift
    # 6.2.4), and 6.2.4's optimizer SIGSEGVs in the SendNonSendable
    # SIL pass when compiling InferenceEngine.swift under `-O`. The
    # crash is reproducible on any commit that compiles cleanly on
    # 6.3; it is not something this project can work around without
    # restructuring the AsyncStream/Task captures that every
    # streaming path depends on. Until 6.2.4 is patched on the
    # runner image, we have to ride a runner that ships 6.3.
    runs-on: macos-26-arm64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Package.swift declares `swift-tools-version: 6.2`, but the
      # codebase exercises Swift 6.3 strict-concurrency analysis
      # (see runner comment above for the 6.2.4 compiler crash).
      # Xcode 26.4.1 is the runner default and ships Swift 6.3;
      # we still set it explicitly so an image update that swaps
      # the default cannot regress us silently. The next step
      # asserts the Swift version to make any such drift fail
      # loudly instead of recompiling under a stale toolchain.
      - name: Pin Xcode (Swift 6.3)
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Show Swift / Xcode / hardware info
        run: |
          swift --version
          xcrun --sdk macosx --show-sdk-version
          sysctl -n machdep.cpu.brand_string || echo "no sysctl"
          # Hard-fail if the selected toolchain is not Swift 6.3.x.
          # Swift 6.2.4 has a known optimizer crash on this codebase.
          swift --version | grep -qE 'Apple Swift version 6\.3\.'

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # `--build-tests` compiles the xctest bundle so the metallib
      # post-process step has something to copy resources into.
      # `-Xswiftc -enable-testing` is needed because the test
      # suite uses `@testable import KLMRegistry` (and other
      # `@testable` imports). `swift test` enables testability
      # automatically, but `swift build --build-tests` does not
      # unless we pass it through, and we need build separate
      # from test so the metallib step can slot in between.
      - name: Build (release, with tests)
        run: swift build -c release --build-tests -Xswiftc -enable-testing

      # REQUIRE_METALLIB=1 makes the Makefile exit non-zero when
      # the Metal toolchain or the MLX checkout is missing, instead
      # of silently succeeding (default behaviour mirrors `make
      # release` for that reason).
      - name: Compile Metal shaders
        run: make metallib CONFIGURATION=release REQUIRE_METALLIB=1

      - name: Run tests (release)
        run: swift test -c release --skip-build

      - name: Print version
        run: .build/release/krillm --version
